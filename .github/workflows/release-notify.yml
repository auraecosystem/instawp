name: Release Notification

# Posts a Claude-generated release summary to Slack when a new version is
# published. Release notes come from the matching CHANGELOG section plus the
# commits since the previous `v*` tag. The GitHub Release itself is created by
# publish.yml; this is the team-facing Slack notification.
#
# Triggered via workflow_dispatch ONLY — `publish.yml` dispatches it after a
# successful npm publish (and you can run it manually to backfill). It is NOT
# triggered on `push`: the CLI releases by pushing a tag, but
# anthropics/claude-code-action rejects the push event ("Unsupported event
# type: push"), so the tag-push pipeline (publish.yml) hands off to this via
# workflow_dispatch instead.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to notify for (e.g. v0.0.1-beta.18). Defaults to the latest v* tag.'
        required: false
        default: ''

jobs:
  release-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release context
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              TAG=$(git tag -l 'v*' --sort=-creatordate | head -n1)
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No tag to notify for."
            exit 1
          fi
          VERSION="${TAG#v}"
          TAG_SHA=$(git rev-list -n1 "$TAG")
          AUTHOR=$(git log -1 --format='%an' "$TAG_SHA")
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved release: $TAG (version $VERSION) by $AUTHOR"

      - name: Gather release notes + commits
        id: notes
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"

          # Previous v* tag (newest first by creation date, excluding this one).
          PREV_TAG=$(git tag -l 'v*' --sort=-creatordate | grep -vxF "$TAG" | head -n1)
          echo "Previous tag: ${PREV_TAG:-<none>}"

          if [ -n "$PREV_TAG" ]; then
            COMMIT_LOG=$(git log --oneline --no-merges "${PREV_TAG}..${TAG}")
            DIFF_STATS=$(git diff --stat "$PREV_TAG" "$TAG" 2>/dev/null || echo "")
          else
            # First release: bound the history so we don't dump the whole repo.
            COMMIT_LOG=$(git log --oneline --no-merges -20 "$TAG")
            DIFF_STATS=""
          fi

          COMMIT_COUNT=$(printf '%s\n' "$COMMIT_LOG" | grep -c . || true)
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"

          # This version's CHANGELOG section (authoritative release notes).
          # Match the header exactly ("## <version> ") so beta.1 != beta.14.
          CHANGELOG_SECTION=$(awk -v hdr="## ${VERSION} " '
            index($0, hdr) == 1 { flag = 1; next }
            /^## / && flag { exit }
            flag { print }
          ' CHANGELOG.md)

          {
            echo "commit_log<<COMMITS_EOF"
            echo "$COMMIT_LOG"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "diff_stats<<DIFF_EOF"
            echo "$DIFF_STATS"
            echo "DIFF_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "changelog_section<<CL_EOF"
            echo "$CHANGELOG_SECTION"
            echo "CL_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Found $COMMIT_COUNT commits since ${PREV_TAG:-start}"

      - name: Claude Analysis
        if: steps.notes.outputs.commit_count != '0'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are analyzing a published release of the cli repository (the InstaWP CLI — a TypeScript command-line tool published to npm as @instawp/cli, for managing WordPress sites, servers, snapshots/versions, and local development from the terminal).

            Version ${{ steps.release.outputs.version }} (tag ${{ steps.release.outputs.tag }}) was just published to npm.

            CHANGELOG entry for this version (authoritative — prefer this):
            ${{ steps.notes.outputs.changelog_section }}

            Commits since the previous release:
            ${{ steps.notes.outputs.commit_log }}

            File change statistics:
            ${{ steps.notes.outputs.diff_stats }}

            Analyze these changes and output ONLY a valid JSON object (no markdown fences, no explanation, no other text) with exactly these fields:

            {
              "should_notify": true/false - set false ONLY if changes are exclusively docs, CI config, code style, or comments with zero user impact,
              "summary": "1-2 sentence executive summary of what changed and why it matters",
              "risk_level": "low|medium|high" - low for minor fixes, medium for feature work, high for breaking changes or security fixes,
              "support_notes": "- bullet points for support team\n- user-facing changes, new behaviors, potential questions",
              "marketing_notes": "- bullet points for marketing about features worth highlighting (empty string if purely technical)",
              "changelog": "### Added\n- items\n### Improved\n- items\n### Fixed\n- items\n### Security\n- items (omit empty categories)"
            }
          claude_args: '--max-turns 3'

      - name: Post to Slack
        id: slack
        if: steps.notes.outputs.commit_count != '0'
        env:
          SLACK_WEBHOOK: ${{ secrets.RELEASE_SLACK_WEBHOOK }}
          CLAUDE_ACTION_OUTPUT: ${{ steps.claude.outputs.result }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_AUTHOR: ${{ steps.release.outputs.author }}
          COMMIT_COUNT: ${{ steps.notes.outputs.commit_count }}
        run: |
          # Extract Claude's JSON response using python3 for robust parsing
          EXEC_FILE="/home/runner/work/_temp/claude-execution-output.json"

          python3 -c '
          import json, os, sys

          def extract_json_with_should_notify(text):
              if not text or not isinstance(text, str):
                  return None
              text = text.strip()
              try:
                  obj = json.loads(text)
                  if isinstance(obj, dict) and "should_notify" in obj:
                      return json.dumps(obj)
              except Exception:
                  pass
              # Brace-matching to find JSON blocks in surrounding text
              brace_depth = 0
              start = None
              for i, ch in enumerate(text):
                  if ch == "{":
                      if brace_depth == 0:
                          start = i
                      brace_depth += 1
                  elif ch == "}":
                      brace_depth -= 1
                      if brace_depth == 0 and start is not None:
                          try:
                              obj = json.loads(text[start:i+1])
                              if isinstance(obj, dict) and "should_notify" in obj:
                                  return json.dumps(obj)
                          except Exception:
                              pass
                          start = None
              return None

          def search_events(events):
              """Search a list of event dicts for result containing should_notify."""
              for ev in events:
                  if not isinstance(ev, dict):
                      continue
                  if ev.get("type") == "result":
                      raw = ev.get("result", "")
                      if isinstance(raw, dict) and "should_notify" in raw:
                          return json.dumps(raw)
                      if isinstance(raw, str):
                          r = extract_json_with_should_notify(raw)
                          if r:
                              return r
                  # Also check subResult or nested content
                  for key in ("result", "content", "text", "output"):
                      val = ev.get(key, "")
                      if isinstance(val, str) and "should_notify" in val:
                          r = extract_json_with_should_notify(val)
                          if r:
                              return r
              return None

          # 1. Try action output
          action_output = os.environ.get("CLAUDE_ACTION_OUTPUT", "")
          r = extract_json_with_should_notify(action_output)
          if r:
              print(r)
              sys.exit(0)

          # 2. Try execution output file
          exec_file = os.environ.get("EXEC_FILE", "/home/runner/work/_temp/claude-execution-output.json")
          if not os.path.exists(exec_file):
              sys.exit(1)

          with open(exec_file) as f:
              content = f.read()
          print(f"Exec file: {len(content)} bytes", file=sys.stderr)

          # Try as JSON array first
          try:
              data = json.loads(content)
              if isinstance(data, list):
                  r = search_events(data)
                  if r:
                      print(r)
                      sys.exit(0)
          except Exception:
              pass

          # Try as JSONL (one JSON object per line)
          for line in content.splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  obj = json.loads(line)
              except Exception:
                  continue
              if isinstance(obj, dict):
                  r = search_events([obj])
                  if r:
                      print(r)
                      sys.exit(0)

          # Last resort: search raw text
          r = extract_json_with_should_notify(content)
          if r:
              print(r)
              sys.exit(0)

          sys.exit(1)
          ' > /tmp/claude_extracted.json 2>/tmp/claude_extract.log || true

          CLAUDE_OUTPUT=""
          if [ -f /tmp/claude_extracted.json ] && [ -s /tmp/claude_extracted.json ]; then
            CLAUDE_OUTPUT=$(cat /tmp/claude_extracted.json)
          fi

          if [ -z "$CLAUDE_OUTPUT" ] || ! echo "$CLAUDE_OUTPUT" | jq -e '.should_notify' > /dev/null 2>&1; then
            echo "::warning::Could not extract Claude JSON output."
            cat /tmp/claude_extract.log 2>/dev/null || true
            if [ -f "$EXEC_FILE" ]; then
              echo "Execution file last 5 lines:"
              tail -5 "$EXEC_FILE" 2>/dev/null || true
              echo "---"
              echo "Searching for 'should_notify' in execution file:"
              grep -c "should_notify" "$EXEC_FILE" 2>/dev/null || echo "Not found"
              echo "Searching for 'result' type entries:"
              grep -c '"type"' "$EXEC_FILE" 2>/dev/null || echo "Not found"
            fi
            echo "notified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Extracted Claude output: ${#CLAUDE_OUTPUT} chars"

          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "::warning::RELEASE_SLACK_WEBHOOK secret is not set. Skipping."
            echo "notified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHOULD_NOTIFY=$(echo "$CLAUDE_OUTPUT" | jq -r '.should_notify')
          if [ "$SHOULD_NOTIFY" != "true" ]; then
            echo "Claude determined notification is not warranted. Skipping."
            echo "notified=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SUMMARY=$(echo "$CLAUDE_OUTPUT" | jq -r '.summary')
          RISK_LEVEL=$(echo "$CLAUDE_OUTPUT" | jq -r '.risk_level')
          SUPPORT_NOTES=$(echo "$CLAUDE_OUTPUT" | jq -r '.support_notes')
          MARKETING_NOTES=$(echo "$CLAUDE_OUTPUT" | jq -r '.marketing_notes')
          CHANGELOG=$(echo "$CLAUDE_OUTPUT" | jq -r '.changelog')

          case "$RISK_LEVEL" in
            low) RISK_EMOJI="🟢" ;;
            medium) RISK_EMOJI="🟡" ;;
            high) RISK_EMOJI="🔴" ;;
            *) RISK_EMOJI="⚪" ;;
          esac

          PAYLOAD=$(jq -n \
            --arg repo "cli" \
            --arg summary "$SUMMARY" \
            --arg risk "$RISK_EMOJI $RISK_LEVEL" \
            --arg release_url "$RELEASE_URL" \
            --arg release_tag "$RELEASE_TAG" \
            --arg release_author "$RELEASE_AUTHOR" \
            --arg commits "$COMMIT_COUNT" \
            --arg support "$SUPPORT_NOTES" \
            --arg changelog "$CHANGELOG" \
            --arg marketing "$MARKETING_NOTES" \
            --arg timestamp "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            '{
              blocks: ([
                {
                  type: "header",
                  text: { type: "plain_text", text: "\($repo) — Release Published", emoji: true }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: "*Release:* <\($release_url)|\($release_tag)>" },
                    { type: "mrkdwn", text: "*Author:* \($release_author)" },
                    { type: "mrkdwn", text: "*Commits:* \($commits)" },
                    { type: "mrkdwn", text: "*Risk:* \($risk)" }
                  ]
                },
                { type: "divider" },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: "*Summary*\n\($summary)" }
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: "*🎧 Support Notes*\n\($support)" }
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: "*📜 Changelog*\n\($changelog)" }
                }
              ] + (if $marketing != "" then [{
                type: "section",
                text: { type: "mrkdwn", text: "*📣 Marketing Notes*\n\($marketing)" }
              }] else [] end) + [
                {
                  type: "context",
                  elements: [
                    { type: "mrkdwn", text: "\($timestamp) • Generated by Claude AI" }
                  ]
                }
              ])
            }')

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$RESPONSE" = "200" ]; then
            echo "Successfully posted to Slack"
            echo "notified=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Slack webhook returned HTTP $RESPONSE"
            echo "notified=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
