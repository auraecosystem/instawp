name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Lets maintainers iterate on the smoke test without bumping the version.
    # The publish job is gated to skip on manual runs (see `if:` below).

jobs:
  smoke-windows:
    name: Windows bundle smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Pack
        run: npm pack
        shell: bash

      - name: Disable Windows Defender (avoids quarantine of msys DLLs)
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          # Also add the tarball + npm global dir to exclusions in case real-time can't be turned off
          Add-MpPreference -ExclusionPath "$env:APPDATA\npm" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE" -ErrorAction SilentlyContinue
          Write-Host "Defender exclusions set."

      - name: Install packed tarball globally
        run: npm i -g $(ls instawp-cli-*.tgz)
        shell: bash

      - name: List installed bundle (diagnostic)
        shell: pwsh
        run: |
          $cliRoot = "$env:APPDATA\npm\node_modules\@instawp\cli"
          Write-Host "--- contents of $cliRoot\bin\win32 ---"
          if (Test-Path "$cliRoot\bin\win32") {
            Get-ChildItem -Force "$cliRoot\bin\win32" | Format-Table Name, Length -AutoSize
          } else {
            Write-Host "Directory does NOT exist."
            Write-Host "--- listing $cliRoot ---"
            if (Test-Path $cliRoot) {
              Get-ChildItem -Force $cliRoot | Format-Table Name -AutoSize
            } else {
              Write-Host "$cliRoot does not exist either."
              Write-Host "--- listing $env:APPDATA\npm\node_modules ---"
              Get-ChildItem -Force "$env:APPDATA\npm\node_modules" -ErrorAction SilentlyContinue | Format-Table Name -AutoSize
            }
          }

      - name: Verify bundled rsync.exe loads (DLL chain integrity)
        shell: pwsh
        run: |
          $cliRoot = "$env:APPDATA\npm\node_modules\@instawp\cli"
          $rsync = Join-Path $cliRoot "bin\win32\rsync.exe"
          $busybox = Join-Path $cliRoot "bin\win32\busybox.exe"
          if (-not (Test-Path $rsync)) { throw "rsync.exe not found at $rsync" }
          if (-not (Test-Path $busybox)) { throw "busybox.exe not found at $busybox" }
          Write-Host "--- rsync --version ---"
          & $rsync --version
          if ($LASTEXITCODE -ne 0) { throw "rsync.exe failed to execute (exit $LASTEXITCODE). DLL chain is broken." }
          Write-Host "--- busybox awk --help ---"
          & $busybox awk --help 2>&1 | Select-Object -First 5
          if ($LASTEXITCODE -ne 0) { throw "busybox.exe awk failed (exit $LASTEXITCODE)" }
          Write-Host "--- instawp --version ---"
          instawp --version

  publish:
    name: Publish to npm
    needs: smoke-windows
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
