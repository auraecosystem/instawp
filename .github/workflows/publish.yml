name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Lets maintainers iterate on the smoke test without bumping the version.
    # The publish job is gated to skip on manual runs (see `if:` below).

jobs:
  smoke-windows:
    name: Windows smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Pack
        run: npm pack
        shell: bash

      - name: Verify bundled busybox in the published tarball
        shell: pwsh
        run: |
          # Verify via tar extract, NOT `npm i -g`: the GHA Windows runner's
          # global install drops vendor/win32 (Defender/runner quirk). Real user
          # installs are unaffected. The tarball is the published artifact.
          $tgz = Get-ChildItem -Filter "instawp-cli-*.tgz" | Select-Object -First 1
          if (-not $tgz) { throw "No tarball found" }
          $extract = Join-Path $env:RUNNER_TEMP "tgz"
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          tar -xzf $tgz.FullName -C $extract
          $busybox = Join-Path $extract "package\vendor\win32\busybox.exe"
          if (-not (Test-Path $busybox)) {
            Get-ChildItem -Recurse "$extract\package\vendor" | Format-Table FullName
            throw "busybox.exe missing from tarball"
          }
          Write-Host "--- busybox awk (from extracted tarball) ---"
          & $busybox awk 'BEGIN { print "awk works" }'
          if ($LASTEXITCODE -ne 0) { throw "busybox awk failed (exit $LASTEXITCODE)" }

      - name: Install globally + verify CLI and native/SFTP deps load
        shell: pwsh
        run: |
          npm i -g (Get-ChildItem -Filter "instawp-cli-*.tgz").FullName
          if ($LASTEXITCODE -ne 0) { throw "npm i -g failed" }

          Write-Host "--- instawp --version ---"
          instawp --version
          if ($LASTEXITCODE -ne 0) { throw "instawp --version failed (exit $LASTEXITCODE)" }

          $nm = "$env:APPDATA\npm\node_modules\@instawp\cli\node_modules" -replace '\\','/'
          Write-Host "--- ssh2-sftp-client (Windows transport) loads ---"
          node -e "const C=require('$nm/ssh2-sftp-client'); new C(); console.log('ssh2-sftp-client OK')"
          if ($LASTEXITCODE -ne 0) { throw "ssh2-sftp-client failed to load (exit $LASTEXITCODE)" }

          Write-Host "--- better-sqlite3 native module loads ---"
          node -e "require('$nm/better-sqlite3'); console.log('better-sqlite3 OK')"
          if ($LASTEXITCODE -ne 0) { throw "better-sqlite3 failed to load (exit $LASTEXITCODE)" }

  publish:
    name: Publish to npm
    needs: smoke-windows
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
