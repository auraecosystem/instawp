name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Lets maintainers iterate on the smoke test without bumping the version.
    # The publish job is gated to skip on manual runs (see `if:` below).

jobs:
  smoke-windows:
    name: Windows smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Pack
        run: npm pack
        shell: bash

      - name: Install packed tarball globally
        run: npm i -g $(ls instawp-cli-*.tgz)
        shell: bash

      - name: Verify CLI + bundled busybox + SFTP dependency
        shell: pwsh
        run: |
          $cliRoot = "$env:APPDATA\npm\node_modules\@instawp\cli"
          $busybox = Join-Path $cliRoot "vendor\win32\busybox.exe"

          Write-Host "--- bundle listing ---"
          Get-ChildItem -Force "$cliRoot\vendor\win32" | Format-Table Name, Length -AutoSize

          if (-not (Test-Path $busybox)) { throw "busybox.exe missing from installed package" }

          Write-Host "--- busybox awk ---"
          & $busybox awk 'BEGIN { print "awk works" }'
          if ($LASTEXITCODE -ne 0) { throw "busybox awk failed (exit $LASTEXITCODE)" }

          Write-Host "--- instawp --version ---"
          instawp --version
          if ($LASTEXITCODE -ne 0) { throw "instawp --version failed (exit $LASTEXITCODE)" }

          Write-Host "--- SFTP transport loads (ssh2-sftp-client) ---"
          node -e "const C=require('$($cliRoot -replace '\\','/')/node_modules/ssh2-sftp-client'); new C(); console.log('ssh2-sftp-client OK')"
          if ($LASTEXITCODE -ne 0) { throw "ssh2-sftp-client failed to load (exit $LASTEXITCODE)" }

          Write-Host "--- better-sqlite3 native module loads ---"
          node -e "require('$($cliRoot -replace '\\','/')/node_modules/better-sqlite3'); console.log('better-sqlite3 OK')"
          if ($LASTEXITCODE -ne 0) { throw "better-sqlite3 failed to load (exit $LASTEXITCODE)" }

  publish:
    name: Publish to npm
    needs: smoke-windows
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
