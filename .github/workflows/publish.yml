name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Lets maintainers iterate on the smoke test without bumping the version.
    # The publish job is gated to skip on manual runs (see `if:` below).

jobs:
  smoke-windows:
    name: Windows bundle smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: List bundle in workspace (sanity)
        shell: pwsh
        run: |
          Write-Host "--- contents of vendor/win32 in workspace ---"
          Get-ChildItem -Force "vendor/win32" | Format-Table Name, Length -AutoSize

      - name: Run bundled binaries directly from workspace (no npm install needed)
        shell: pwsh
        run: |
          $rsync = "$env:GITHUB_WORKSPACE\vendor\win32\rsync.exe"
          $busybox = "$env:GITHUB_WORKSPACE\vendor\win32\busybox.exe"
          if (-not (Test-Path $rsync)) { throw "rsync.exe not in workspace bundle" }
          if (-not (Test-Path $busybox)) { throw "busybox.exe not in workspace bundle" }

          Write-Host "--- rsync --version ---"
          & $rsync --version
          if ($LASTEXITCODE -ne 0) { throw "rsync.exe failed to execute (exit $LASTEXITCODE). DLL chain is broken." }

          Write-Host "--- busybox awk version ---"
          & $busybox awk 'BEGIN { print "awk works" }'
          if ($LASTEXITCODE -ne 0) { throw "busybox awk failed (exit $LASTEXITCODE)" }

      - name: Pack
        run: npm pack
        shell: bash

      - name: Verify packed tarball contains vendor/win32 + extracted DLL chain works
        shell: pwsh
        run: |
          # Extract the npm tarball to a clean dir and run rsync.exe from there.
          # We skip `npm install -g` because the GHA Windows runner's Defender
          # (with tamper protection) quarantines msys DLLs during the global
          # install path — but real user installs aren't affected (see
          # https://github.com/InstaWP/cli/issues — first Windows install screenshot
          # showed bundle files present at the expected location).
          $tgz = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "instawp-cli-*.tgz" | Select-Object -First 1
          if (-not $tgz) { throw "No tarball found in workspace" }

          $extract = Join-Path $env:RUNNER_TEMP "tarball-extract"
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          tar -xzf $tgz.FullName -C $extract
          if ($LASTEXITCODE -ne 0) { throw "tar extract failed" }

          $vendorDir = Join-Path $extract "package\vendor\win32"
          if (-not (Test-Path $vendorDir)) {
            Write-Host "--- listing $extract\package ---"
            Get-ChildItem -Force -Recurse "$extract\package" | Select-Object FullName | Format-Table -AutoSize
            throw "vendor\win32 missing from tarball"
          }
          Write-Host "--- vendor\win32 contents from tarball ---"
          Get-ChildItem -Force $vendorDir | Format-Table Name, Length -AutoSize

          $rsync = Join-Path $vendorDir "rsync.exe"
          if (-not (Test-Path $rsync)) { throw "rsync.exe not in extracted tarball" }

          Write-Host "--- rsync --version (from extracted tarball) ---"
          & $rsync --version
          if ($LASTEXITCODE -ne 0) { throw "Extracted rsync.exe failed (exit $LASTEXITCODE)" }

  publish:
    name: Publish to npm
    needs: smoke-windows
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
